<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="GDKD App">
  <meta name="theme-color" content="#1a3a5c">
  <link rel="manifest" href="manifest.json">
  <link rel="apple-touch-icon" href="assets/apple-touch-icon.svg">
  <link rel="icon" type="image/svg+xml" href="assets/icon.svg">
  <title>Migration — Khách hàng v1 → v2</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { padding: 24px; font-family: sans-serif; background: var(--bg, #f4f6f9); }
    pre { background: #fff; border: 1px solid #dce3ea; border-radius: 8px; padding: 16px; font-size: .8rem; overflow: auto; max-height: 400px; }
    .btn { padding: 8px 20px; border-radius: 8px; cursor: pointer; border: none; font-size: 1rem; }
    .btn-primary { background: #1a3a5c; color: #fff; }
    .btn-danger { background: #c62828; color: #fff; }
    .log { margin-top: 16px; padding: 12px; border-radius: 8px; }
    .log.ok { background: #e8f5e9; color: #2e7d32; }
    .log.err { background: #ffebee; color: #c62828; }
  </style>
</head>
<body>
  <h2>Migration: Khách hàng v1 → v2</h2>
  <p>Trang này chuyển đổi <code>khach-hang.json</code> từ schema cũ <code>{ton_thang_cu, ky_moi}</code> và <code>cskh.json</code> sang schema v2 <code>{khach_hang: []}</code>.</p>
  <p><strong>⚠ Chỉ chạy 1 lần.</strong> Sau khi chạy, xoá hoặc giữ trang này làm archive.</p>

  <div style="display:flex;gap:12px;margin:20px 0;flex-wrap:wrap">
    <button class="btn btn-primary" id="btn-preview">1. Xem trước dữ liệu cũ</button>
    <button class="btn btn-primary" id="btn-migrate" disabled>2. Chạy migration</button>
  </div>

  <div id="preview-area"></div>
  <div id="log-area"></div>

  <script type="module">
    import { readData, writeData, getToken, getRepoConfig } from './assets/api.js';

    const btnPreview = document.getElementById('btn-preview');
    const btnMigrate = document.getElementById('btn-migrate');
    const previewArea = document.getElementById('preview-area');
    const logArea = document.getElementById('log-area');

    function log(msg, type = 'ok') {
      logArea.innerHTML = `<div class="log ${type}">${msg}</div>`;
    }

    const STEP_TO_STATUS = { 1: 'dang_xu_ly', 2: 'dang_xu_ly', 3: 'dang_xu_ly', 4: 'cho_giao', 5: 'cho_giao', 6: 'da_giao' };
    const OLD_STATUS_MAP = {
      vua_ky: 'moi_ky', dang_lam_vay: 'dang_xu_ly',
      cho_xe_ve: 'cho_giao', san_sang: 'cho_giao', da_giao_xe: 'da_giao',
    };

    let khRaw = null;
    let cskhRaw = null;

    btnPreview.addEventListener('click', async () => {
      try {
        log('Đang đọc dữ liệu...', 'ok');
        [khRaw, cskhRaw] = await Promise.all([
          readData('khach-hang.json').catch(() => ({ ton_thang_cu: [], ky_moi: [], khach_hang: [] })),
          readData('cskh.json').catch(() => ({ danh_sach: [] })),
        ]);

        const tonCount = (khRaw.ton_thang_cu || []).length;
        const kyMoiCount = (khRaw.ky_moi || []).length;
        const khV2Count = (khRaw.khach_hang || []).length;
        const cskhCount = (cskhRaw.danh_sach || []).length;

        previewArea.innerHTML = [
          `<h3>Dữ liệu hiện tại</h3>`,
          `<ul>`,
          `<li>HĐ tồn tháng cũ (v1): <strong>${tonCount}</strong></li>`,
          `<li>KH ký mới (v1): <strong>${kyMoiCount}</strong></li>`,
          `<li>KH v2 (nếu đã migrate rồi): <strong>${khV2Count}</strong></li>`,
          `<li>CSKH cũ (cskh.json): <strong>${cskhCount}</strong></li>`,
          `</ul>`,
          tonCount + kyMoiCount === 0 && khV2Count === 0
            ? '<p style="color:orange">⚠ Không có dữ liệu cũ để migrate. Dữ liệu đang trống.</p>'
            : '',
          khV2Count > 0 && (tonCount + kyMoiCount) === 0
            ? '<p style="color:green">✅ Dữ liệu đã ở schema v2 rồi. Không cần migrate lại.</p>'
            : '',
          `<details><summary>Raw khach-hang.json</summary><pre>${JSON.stringify(khRaw, null, 2)}</pre></details>`,
          `<details><summary>Raw cskh.json</summary><pre>${JSON.stringify(cskhRaw, null, 2)}</pre></details>`,
        ].join('');

        if ((tonCount + kyMoiCount) > 0) {
          btnMigrate.disabled = false;
          log('Đọc xong. Bấm "Chạy migration" để tiến hành.', 'ok');
        } else {
          log('Không có dữ liệu v1 cần migrate.', 'ok');
        }
      } catch (e) {
        log(`Lỗi đọc dữ liệu: ${e.message}`, 'err');
      }
    });

    btnMigrate.addEventListener('click', async () => {
      if (!getToken() || !getRepoConfig().owner) {
        log('Cần cấu hình token/repo GitHub trước. Mở app, vào Cài đặt để nhập token.', 'err');
        return;
      }
      try {
        btnMigrate.disabled = true;
        log('Đang chạy migration...', 'ok');

        const result = [];
        const orphanCskh = [];

        // Migrate ton_thang_cu
        for (const item of (khRaw.ton_thang_cu || [])) {
          result.push({
            id: item.id,
            ten: item.ten || '', sdt: item.sdt || '', dia_chi: '',
            nhan_vien_id: null, xe_id: null,
            ghi_chu_ctkm: item.vuong_mac || '',
            trang_thai: STEP_TO_STATUS[item.buoc_hien_tai] || 'dang_xu_ly',
            ngay_du_kien_ky: null, ngay_ky: item.ngay_ky || null,
            ngay_giao_du_kien: item.du_kien_nhan_xe || null, ngay_giao_thuc_te: null,
            hinh_thuc_tt: item.hinh_thuc_tt || 'vay_von',
            ngan_hang: item.ngan_hang || '', so_tien_vay: Number(item.so_tien_vay) || 0,
            muc_dong_mong_muon: 0, so_hd: item.so_hd || '',
            tien_do: (item.cap_nhat || []).map((u, i) => ({ ngay: u.ngay || '', buoc: i + 1, noi_dung: u.noi_dung || '' })),
            cskh: [],
          });
        }

        // Migrate ky_moi
        for (const item of (khRaw.ky_moi || [])) {
          result.push({
            id: item.id,
            ten: item.ten || '', sdt: item.sdt || '', dia_chi: '',
            nhan_vien_id: null, xe_id: null,
            ghi_chu_ctkm: item.ghi_chu || '',
            trang_thai: OLD_STATUS_MAP[item.trang_thai] || 'moi_ky',
            ngay_du_kien_ky: null, ngay_ky: item.ngay_ky || null,
            ngay_giao_du_kien: item.du_kien_nhan_xe || null, ngay_giao_thuc_te: null,
            hinh_thuc_tt: item.hinh_thuc_tt || 'vay_von',
            ngan_hang: '', so_tien_vay: 0,
            muc_dong_mong_muon: Number(item.muc_dong_mong_muon) || 0,
            so_hd: item.so_hd || '',
            tien_do: [], cskh: [],
          });
        }

        // Merge cskh.json vào KH theo ten_kh
        for (const cskhEntry of (cskhRaw.danh_sach || [])) {
          const kh = result.find((k) => k.ten === cskhEntry.ten_kh);
          if (kh) {
            kh.cskh.push({
              ngay: cskhEntry.ngay_giao || cskhEntry.ngay || new Date().toISOString().slice(0, 10),
              kenh: cskhEntry.kenh || 'dien_thoai',
              danh_gia: Number(cskhEntry.danh_gia) || 0,
              phan_hoi: cskhEntry.phan_hoi_mau_xe || '',
              van_de: cskhEntry.van_de || '',
              trang_thai_xu_ly: cskhEntry.trang_thai_xu_ly || 'chua_xu_ly',
              ghi_chu_noi_bo: cskhEntry.ghi_chu_noi_bo || '',
            });
          } else {
            orphanCskh.push(cskhEntry);
          }
        }

        // Ghi khach-hang.json v2
        await writeData('khach-hang.json', { khach_hang: result });

        // Ghi orphan-cskh.json nếu có
        if (orphanCskh.length > 0) {
          await writeData('orphan-cskh.json', { orphan: orphanCskh }).catch(() => {});
        }

        log(`✅ Migration hoàn thành! Đã migrate ${result.length} KH. Orphan CSKH: ${orphanCskh.length}. Reload app để xem.`, 'ok');
        previewArea.innerHTML += `<h3>Kết quả migration</h3><pre>${JSON.stringify({ khach_hang: result }, null, 2)}</pre>`;
        if (orphanCskh.length > 0) {
          previewArea.innerHTML += `<h3>⚠ Orphan CSKH (không tìm được KH tương ứng)</h3><pre>${JSON.stringify(orphanCskh, null, 2)}</pre>`;
        }
      } catch (e) {
        log(`Lỗi migration: ${e.message}`, 'err');
        btnMigrate.disabled = false;
      }
    });
  </script>
</body>
</html>

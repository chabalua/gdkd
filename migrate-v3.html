<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#1a3a5c">
  <title>Migration v3</title>
  <link rel="stylesheet" href="assets/style.css">
  <style>
    body { padding: 24px; background: var(--bg); color: var(--text); }
    .migration-wrap { max-width: 1280px; margin: 0 auto; display: grid; gap: 16px; }
    .migration-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 16px; }
    .migration-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow); padding: 16px; }
    .migration-actions { display: flex; gap: 12px; flex-wrap: wrap; }
    .migration-log { min-height: 52px; }
    .migration-log .is-error { color: var(--danger); }
    .migration-log .is-success { color: var(--success); }
    .json-preview { margin: 0; white-space: pre-wrap; word-break: break-word; max-height: 70vh; overflow: auto; background: #0f1720; color: #e8eef5; border-radius: 12px; padding: 16px; font-size: 12px; line-height: 1.45; }
    .migration-meta { display: flex; gap: 12px; flex-wrap: wrap; color: var(--text-muted); font-size: 14px; }
  </style>
</head>
<body>
  <main class="migration-wrap">
    <section class="migration-card">
      <p class="page-kicker">Migration v3</p>
      <h1 class="page-title">Dọn schema v2 sang v3</h1>
      <p class="page-subtitle">Trang này đọc dữ liệu hiện tại, dựng preview v3, backup file gốc vào <strong>assets/data/_backup_v2/</strong>, rồi ghi đè lên GitHub.</p>
      <div class="migration-actions">
        <button type="button" class="btn btn-soft" id="btn-preview-v2">1. Xem trước v2</button>
        <button type="button" class="btn btn-secondary" id="btn-preview-v3" disabled>2. Xem preview v3</button>
        <button type="button" class="btn btn-primary" id="btn-run" disabled>3. Chạy migration</button>
      </div>
      <div class="migration-log" id="migration-log"></div>
    </section>

    <section class="migration-grid">
      <article class="migration-card">
        <h2 class="section-title">Dữ liệu hiện tại</h2>
        <div class="migration-meta" id="meta-v2"></div>
        <pre class="json-preview" id="preview-v2">Bấm "Xem trước v2" để tải dữ liệu.</pre>
      </article>
      <article class="migration-card">
        <h2 class="section-title">Preview schema v3</h2>
        <div class="migration-meta" id="meta-v3"></div>
        <pre class="json-preview" id="preview-v3">Chưa có preview.</pre>
      </article>
    </section>
  </main>

  <script type="module">
    import { getRepoConfig, getToken, readData, writeData } from './assets/api.js';

    const PREVIEW_FILES = ['config.json', 'nhan-vien.json', 'khach-hang.json', 'cong-viec.json'];
    const DEFAULT_DEPARTMENTS = [
      { id: 'kd_1', ten: 'Kinh doanh 1', loai: 'ban_hang' },
      { id: 'kd_2', ten: 'Kinh doanh 2', loai: 'ban_hang' },
      { id: 'mkt', ten: 'Marketing', loai: 'ho_tro' },
      { id: 'kt', ten: 'Kế toán', loai: 'ho_tro' },
    ];
    const DEFAULT_TASKS = [
      { id: 'fb_ca_nhan', ten: 'FB Cá nhân (QC)', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'lead', don_vi: 'so' },
      { id: 'mkt_cty', ten: 'MKT công ty phân bổ', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'lead', don_vi: 'so' },
      { id: 'tiktok', ten: 'TikTok khai thác', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'lead', don_vi: 'so' },
      { id: 'telesales', ten: 'Telesales', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'lead', don_vi: 'so' },
      { id: 'sr_tiep_khach', ten: 'SR tiếp khách', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'lead', don_vi: 'so' },
      { id: 'di_thi_truong', ten: 'Đi thị trường', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'lead', don_vi: 'so' },
      { id: 'luot_lai_thu', ten: 'Lượt lái thử', phong_ban_ids: ['kd_1', 'kd_2'], loai: 'hoat_dong', don_vi: 'luot' },
      { id: 'gio_live', ten: 'Giờ livestream', phong_ban_ids: ['mkt'], loai: 'hoat_dong', don_vi: 'gio' },
      { id: 'so_video', ten: 'Số video', phong_ban_ids: ['mkt'], loai: 'hoat_dong', don_vi: 'so' },
      { id: 'so_tien_chay_quang_cao', ten: 'Tiền chạy quảng cáo', phong_ban_ids: ['mkt'], loai: 'hoat_dong', don_vi: 'tien' },
    ];

    const btnPreviewV2 = document.getElementById('btn-preview-v2');
    const btnPreviewV3 = document.getElementById('btn-preview-v3');
    const btnRun = document.getElementById('btn-run');
    const previewV2 = document.getElementById('preview-v2');
    const previewV3 = document.getElementById('preview-v3');
    const metaV2 = document.getElementById('meta-v2');
    const metaV3 = document.getElementById('meta-v3');
    const logNode = document.getElementById('migration-log');

    let rawData = null;
    let previewData = null;

    function setLog(message, type = 'success') {
      logNode.innerHTML = `<p class="${type === 'error' ? 'is-error' : 'is-success'}">${message}</p>`;
    }

    function safeNumber(value) {
      return Number(value) || 0;
    }

    function mapGroupId(groupId) {
      if (groupId === 'nhom_1') return 'kd_1';
      if (groupId === 'nhom_2') return 'kd_2';
      return groupId || 'kd_1';
    }

    function normalizeDepartments(config) {
      const legacyGroups = Array.isArray(config?.nhom_kinh_doanh) ? config.nhom_kinh_doanh : [];
      const departments = legacyGroups.map((group, index) => ({
        id: mapGroupId(group?.id || `nhom_${index + 1}`),
        ten: group?.ten?.replace(/^Nhóm\s+/i, 'Kinh doanh ') || `Kinh doanh ${index + 1}`,
        loai: 'ban_hang',
      }));
      DEFAULT_DEPARTMENTS.forEach((department) => {
        if (!departments.some((item) => item.id === department.id)) {
          departments.push({ ...department });
        }
      });
      return departments;
    }

    function normalizeTasks(config) {
      const legacyChannels = Array.isArray(config?.lead_channels) ? config.lead_channels : [];
      const tasks = legacyChannels.map((channel) => ({
        id: channel.id,
        ten: channel.label || channel.ten || channel.id,
        phong_ban_ids: ['kd_1', 'kd_2'],
        loai: channel.loai || 'lead',
        don_vi: channel.don_vi || 'so',
      }));
      DEFAULT_TASKS.forEach((task) => {
        if (!tasks.some((item) => item.id === task.id)) {
          tasks.push({ ...task });
        }
      });
      return tasks;
    }

    function migrateConfig(config) {
      return {
        thang_hien_tai: config?.thang_hien_tai || new Date().toISOString().slice(0, 7),
        showroom: config?.showroom || { ten: '', dia_chi: '', gdkd: '' },
        phong_ban: normalizeDepartments(config),
        nhiem_vu_lib: normalizeTasks(config),
      };
    }

    function migrateNhanVien(nhanVien, configV3) {
      const salesTaskIds = configV3.nhiem_vu_lib.filter((task) => task.phong_ban_ids.includes('kd_1') || task.phong_ban_ids.includes('kd_2')).map((task) => task.id);
      return {
        nhan_vien: (Array.isArray(nhanVien?.nhan_vien) ? nhanVien.nhan_vien : []).map((employee) => {
          const du_lieu = {};
          const seenTasks = new Set();
          Object.entries(employee?.lead_theo_thang || {}).forEach(([month, monthBlock]) => {
            du_lieu[month] = { tuan: { 1: {}, 2: {}, 3: {}, 4: {}, 5: {} } };
            Object.entries(monthBlock || {}).forEach(([taskId, metrics]) => {
              seenTasks.add(taskId);
              for (let week = 1; week <= 5; week += 1) {
                const actual = safeNumber(metrics?.tuan?.[week]);
                const target = week === 1 ? safeNumber(metrics?.muc_tieu) : 0;
                if (!actual && !target) continue;
                du_lieu[month].tuan[week][taskId] = { muc_tieu: target, thuc_te: actual };
              }
            });
          });

          Object.entries(employee?.noi_dung || {}).forEach(([month, content]) => {
            const totalVideos = Object.values(content?.videos || {}).reduce((sum, value) => sum + safeNumber(value), 0);
            if (!du_lieu[month]) {
              du_lieu[month] = { tuan: { 1: {}, 2: {}, 3: {}, 4: {}, 5: {} } };
            }
            if (totalVideos) {
              du_lieu[month].tuan[1].so_video = { muc_tieu: 0, thuc_te: totalVideos };
              seenTasks.add('so_video');
            }
          });

          const phong_ban_id = mapGroupId(employee?.nhom_id);
          const defaultTasks = configV3.nhiem_vu_lib
            .filter((task) => task.phong_ban_ids.includes(phong_ban_id))
            .map((task) => task.id);

          return {
            id: employee.id,
            ho_ten: employee.ho_ten || '',
            anh: employee.anh || '',
            chuc_vu: employee.chuc_vu || '',
            sdt: employee.sdt || '',
            ngay_vao: employee.ngay_vao || '',
            phong_ban_id,
            loai_nhan_su: employee.loai_nhan_su || 'chinh_thuc',
            trang_thai: employee.trang_thai || 'dang_lam',
            nhiem_vu_ids: Array.from(seenTasks).length ? Array.from(seenTasks) : (phong_ban_id.startsWith('kd_') ? salesTaskIds : defaultTasks),
            du_lieu,
          };
        }),
      };
    }

    function migrateKhachHang(khachHang) {
      return {
        khach_hang: Array.isArray(khachHang?.khach_hang)
          ? khachHang.khach_hang.map((customer) => ({
            ...customer,
            id: customer.id,
            ten: customer.ten || '',
            nhan_vien_id: customer.nhan_vien_id || '',
            trang_thai: customer.trang_thai || 'du_ky',
            ngay_du_kien_ky: customer.trang_thai === 'du_ky' ? (customer.ngay_du_kien_ky || null) : (customer.ngay_du_kien_ky || null),
            tien_do: Array.isArray(customer.tien_do) ? customer.tien_do : [],
            cskh: Array.isArray(customer.cskh) ? customer.cskh : [],
          }))
          : [],
      };
    }

    function migrateCongViec(congViec) {
      return {
        su_kien_lai_thu: {
          danh_sach: Array.isArray(congViec?.su_kien_lai_thu?.danh_sach) ? congViec.su_kien_lai_thu.danh_sach : [],
        },
        zalo_oa: {
          muc_tieu: safeNumber(congViec?.zalo_oa?.muc_tieu),
          thuc_te: safeNumber(congViec?.zalo_oa?.thuc_te),
          theo_tuan: Array.isArray(congViec?.zalo_oa?.theo_tuan) ? congViec.zalo_oa.theo_tuan : [0, 0, 0, 0, 0],
        },
      };
    }

    async function loadRawData() {
      const [config, nhanVien, khachHang, congViec] = await Promise.all(PREVIEW_FILES.map((file) => readData(file)));
      rawData = { config, nhanVien, khachHang, congViec };
      metaV2.innerHTML = [
        `<span>Tháng: ${config?.thang_hien_tai || '—'}</span>`,
        `<span>Nhân viên: ${(nhanVien?.nhan_vien || []).length}</span>`,
        `<span>Khách hàng: ${(khachHang?.khach_hang || []).length}</span>`,
      ].join('');
      previewV2.textContent = JSON.stringify(rawData, null, 2);
      btnPreviewV3.disabled = false;
      setLog('Đã đọc xong dữ liệu hiện tại.');
    }

    function buildPreview() {
      const config = migrateConfig(rawData.config);
      const nhanVien = migrateNhanVien(rawData.nhanVien, config);
      const khachHang = migrateKhachHang(rawData.khachHang);
      const congViec = migrateCongViec(rawData.congViec);
      previewData = { config, nhanVien, khachHang, congViec };
      metaV3.innerHTML = [
        `<span>Phòng ban: ${config.phong_ban.length}</span>`,
        `<span>Thư viện nhiệm vụ: ${config.nhiem_vu_lib.length}</span>`,
        `<span>Nhân viên v3: ${nhanVien.nhan_vien.length}</span>`,
      ].join('');
      previewV3.textContent = JSON.stringify(previewData, null, 2);
      btnRun.disabled = false;
      setLog('Đã dựng xong preview schema v3.');
    }

    async function backupAndWrite(filename, originalPayload, migratedPayload, timestamp) {
      await writeData(`_backup_v2/${filename.replace('.json', '')}-${timestamp}.json`, originalPayload);
      await writeData(filename, migratedPayload);
    }

    async function runMigration() {
      const repo = getRepoConfig();
      if (!getToken() || !repo?.owner || !repo?.repo) {
        throw new Error('Thiếu token hoặc cấu hình GitHub. Mở app chính để nhập owner/repo/token trước khi chạy migration.');
      }
      const timestamp = new Date().toISOString().replace(/[:.]/g, '-');
      await backupAndWrite('config.json', rawData.config, previewData.config, timestamp);
      await backupAndWrite('nhan-vien.json', rawData.nhanVien, previewData.nhanVien, timestamp);
      await backupAndWrite('khach-hang.json', rawData.khachHang, previewData.khachHang, timestamp);
      await backupAndWrite('cong-viec.json', rawData.congViec, previewData.congViec, timestamp);
    }

    btnPreviewV2.addEventListener('click', async () => {
      btnPreviewV2.disabled = true;
      try {
        await loadRawData();
      } catch (error) {
        setLog(`Không đọc được dữ liệu: ${error.message}`, 'error');
      } finally {
        btnPreviewV2.disabled = false;
      }
    });

    btnPreviewV3.addEventListener('click', () => {
      try {
        if (!rawData) throw new Error('Hãy xem trước dữ liệu hiện tại trước.');
        buildPreview();
      } catch (error) {
        setLog(`Không dựng được preview v3: ${error.message}`, 'error');
      }
    });

    btnRun.addEventListener('click', async () => {
      btnRun.disabled = true;
      try {
        if (!previewData) throw new Error('Hãy dựng preview v3 trước khi ghi dữ liệu.');
        setLog('Đang backup và ghi migration...');
        await runMigration();
        setLog('✓ Đã backup dữ liệu v2 và ghi schema v3 thành công. Mở index.html để kiểm tra app.', 'success');
      } catch (error) {
        setLog(`Migration thất bại: ${error.message}`, 'error');
        btnRun.disabled = false;
      }
    });
  </script>
</body>
</html>
